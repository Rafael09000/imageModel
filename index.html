<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rafael Toledo — Reconhecimento de Imagem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --accent: #00e5a0;
      --accent-dim: #00b87c;
      --bg: #0b0f14;
      --surface: #131920;
      --surface2: #1a2330;
      --border: rgba(255,255,255,0.07);
      --text: #e8edf2;
      --muted: #6b7a8d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 0 1rem;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .brand span {
      color: var(--accent);
    }

    .badge-ai {
      background: rgba(0,229,160,0.1);
      color: var(--accent);
      border: 1px solid rgba(0,229,160,0.25);
      font-size: 0.7rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    main { flex: 1; padding: 2.5rem 0 4rem; }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1.25rem;
    }

    /* Camera card */
    .camera-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      height: 100%;
    }

    #webcam-container {
      background: var(--surface2);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 1;
      width: 100%;
      max-width: 320px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      position: relative;
    }

    #webcam-container canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      border-radius: 12px;
    }

    .cam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .cam-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cam-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--muted);
      fill: none;
    }

    /* Start button */
    .btn-start {
      background: var(--accent);
      color: #0b0f14;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.5rem;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 0 0 0 rgba(0,229,160,0.4);
    }

    .btn-start:hover {
      background: var(--accent-dim);
      box-shadow: 0 0 24px rgba(0,229,160,0.25);
    }

    .btn-start:active { transform: scale(0.97); }

    .btn-start:disabled {
      background: var(--surface2);
      color: var(--muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-start svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      flex-shrink: 0;
    }

    .btn-hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.6rem;
      text-align: center;
    }

    /* Status dot */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 6px;
      transition: background 0.3s;
    }
    .status-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Results card */
    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      height: 100%;
    }

    .class-item {
      margin-bottom: 1.25rem;
    }

    .class-item:last-child { margin-bottom: 0; }

    .class-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .class-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    .class-pct {
      font-family: 'Syne', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 42px;
      text-align: right;
    }

    .progress {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar {
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--muted);
      font-size: 0.875rem;
      gap: 8px;
      text-align: center;
    }

    footer {
      padding: 1.25rem 0;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <div class="d-flex align-items-center gap-3">
      <span class="brand">Rafael <span>Toledo</span></span>
      <span class="badge-ai">Teachable Machine</span>
    </div>
  </div>
</header>

<main>
  <div class="container">
    <div class="row g-4">

      <!-- Câmera -->
      <div class="col-12 col-lg-5">
        <p class="section-title">Câmera</p>
        <div class="camera-card">

          <div id="webcam-container">
            <div class="cam-placeholder" id="cam-placeholder">
              <div class="cam-icon">
                <svg viewBox="0 0 24 24" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/>
                </svg>
              </div>
              <span style="font-size:0.8rem;">Aguardando câmera…</span>
            </div>
          </div>

          <div class="d-flex align-items-center mb-3" style="font-size:0.8rem; color:var(--muted);">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Inativo</span>
          </div>

          <button class="btn-start" id="start-btn" onclick="init()">
            <svg viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z"/>
            </svg>
            Ativar câmera
          </button>
          <p class="btn-hint">O navegador vai solicitar permissão de acesso</p>
        </div>
      </div>

      <!-- Resultados -->
      <div class="col-12 col-lg-7">
        <p class="section-title">Resultados</p>
        <div class="results-card">
          <div id="label-container">
            <div class="empty-state" id="empty-state">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/>
              </svg>
              <span>Ative a câmera para ver as predições</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<footer>
  <div class="container d-flex justify-content-between align-items-center flex-wrap gap-2">
    <span>Rafael Toledo &mdash; Teachable Machine</span>
    <span>Powered by TensorFlow.js</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
  const URL = "https://teachablemachine.withgoogle.com/models/EXai8zp6I/";
  let model, webcam, labelContainer, maxPredictions;
  let classItems = [];

  async function init() {
    const btn = document.getElementById("start-btn");
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2" role="status"></span> Carregando modelo…`;

    document.getElementById("status-text").textContent = "Conectando…";

    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    const flip = true;
    webcam = new tmImage.Webcam(320, 320, flip);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    const container = document.getElementById("webcam-container");
    document.getElementById("cam-placeholder").style.display = "none";
    container.appendChild(webcam.canvas);

    document.getElementById("status-dot").classList.add("active");
    document.getElementById("status-text").textContent = "Ao vivo";

    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <circle cx="12" cy="12" r="3"/><path stroke-linecap="round" d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      Câmera ativa`;

    labelContainer = document.getElementById("label-container");
    document.getElementById("empty-state").remove();
    classItems = [];

    for (let i = 0; i < maxPredictions; i++) {
      const item = document.createElement("div");
      item.className = "class-item";
      item.innerHTML = `
        <div class="class-header">
          <span class="class-name" id="name-${i}">Classe ${i + 1}</span>
          <span class="class-pct" id="pct-${i}">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="bar-${i}" style="width:0%"></div>
        </div>`;
      labelContainer.appendChild(item);
      classItems.push(item);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    for (let i = 0; i < maxPredictions; i++) {
      const p = prediction[i];
      const pct = Math.round(p.probability * 100);
      document.getElementById(`name-${i}`).textContent = p.className;
      document.getElementById(`pct-${i}`).textContent = pct + "%";
      document.getElementById(`bar-${i}`).style.width = pct + "%";
    }
  }
</script>
</body>
</html>
